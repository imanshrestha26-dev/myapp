apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      imagePullSecrets:
        - name: harbor-reg
      containers:
        - name: myapp
          image: 10.13.160.228:80/myproject/myapp:latest
          ports:
            - containerPort: 80
